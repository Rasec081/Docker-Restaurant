version: "3.9" #revisar versiones y ver cual usamos

services:

  postgres:
    image: postgres:15.6
    container_name: restaurant_db
    restart: always

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data  #REVISAR LAS RUTAS DONDE QUEREMOS DEJARLAS 
      - ./db:/docker-entrypoint-initdb.d


  backend:
    build: ./backend
    container_name: restaurant_backend

    ports:
      - "${BACKEND_PORT}:8080"

    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

    depends_on:
      - postgres

volumes:
  postgres_data:
